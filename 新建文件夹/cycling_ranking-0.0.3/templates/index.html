<!DOCTYPE html>
<html>
<head>
    <title>袁庚书院骑行社排行榜</title>
    <style>
    /* 全局重置与基础设置 */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        color: #333;
        line-height: 1.6;
        padding: 20px;
        min-height: 100vh;
    }
    
    .container {
        max-width: 1200px;
        margin: 0 auto;
        background-color: white;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        padding: 30px;
    }
    
    /* 标题样式 */
    h1 {
        color: #2c3e50;
        text-align: center;
        margin-bottom: 10px;
        font-size: 2.5rem;
        font-weight: 700;
        background: linear-gradient(90deg, #3498db, #2ecc71);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        padding-bottom: 10px;
        border-bottom: 3px solid #f1f2f6;
    }
    
    h2 {
        color: #34495e;
        margin: 25px 0 15px;
        padding-left: 10px;
        border-left: 4px solid #3498db;
        font-weight: 600;
    }
    
    /* 数据上传表单美化 */
    form {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        padding: 25px;
        border-radius: 12px;
        margin: 20px 0;
        border: 1px solid #e0e0e0;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }
    
    form label {
        display: block;
        margin-bottom: 8px;
        color: #2c3e50;
        font-weight: 600;
        font-size: 0.95rem;
    }
    
    form input[type="text"],
    form input[type="number"],
    form input[type="date"],
    form input[type="date"] {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 20px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background-color: white;
    }
    
    form input:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        outline: none;
    }
    
    form button[type="submit"] {
        background: linear-gradient(90deg, #3498db, #2980b9);
        color: white;
        border: none;
        padding: 14px 28px;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: block;
        width: 100%;
        letter-spacing: 0.5px;
    }
    
    form button[type="submit"]:hover {
        background: linear-gradient(90deg, #2980b9, #3498db);
        transform: translateY(-2px);
        box-shadow: 0 7px 14px rgba(52, 152, 219, 0.3);
    }
    
    /* 筛选区域美化 */
    #filterSection {
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        padding: 20px;
        border-radius: 12px;
        margin: 25px 0;
        border: 1px solid #e0e0e0;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }
    
    #filterSection label {
        display: inline-block;
        margin-right: 10px;
        font-weight: 600;
        color: #2c3e50;
    }
    
    #filterSection input[type="date"] {
        padding: 10px 12px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 0.95rem;
        margin-right: 15px;
        width: 180px;
    }
    
    #filterSection button {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-right: 10px;
    }
    
    #filterSection button:nth-of-type(1) {
        background: linear-gradient(90deg, #2ecc71, #27ae60);
        color: white;
    }
    
    #filterSection button:nth-of-type(2) {
        background: linear-gradient(90deg, #e74c3c, #c0392b);
        color: white;
    }
    
    #filterSection button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
    }
    
    /* 排序选择器美化 */
    #sortOption {
        padding: 10px 15px;
        border: 2px solid #3498db;
        border-radius: 8px;
        background-color: white;
        font-size: 1rem;
        font-weight: 500;
        color: #2c3e50;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 20px;
        width: 200px;
    }
    
    #sortOption:focus {
        outline: none;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
    }
    
    /* 表格美化 */
    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 20px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    }
    
    thead {
        background: linear-gradient(90deg, #2c3e50, #34495e);
    }
    
    th {
        padding: 18px 15px;
        text-align: center;
        color: white;
        font-weight: 600;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    th:last-child {
        border-right: none;
    }
    
    tbody tr {
        transition: all 0.3s ease;
    }
    
    tbody tr:nth-child(even) {
        background-color: #f8f9fa;
    }
    
    tbody tr:nth-child(odd) {
        background-color: white;
    }
    
    tbody tr:hover {
        background-color: #e3f2fd;
        transform: scale(1.005);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
    }
    
    td {
        padding: 16px 15px;
        text-align: center;
        border-bottom: 1px solid #f1f2f6;
        font-size: 0.95rem;
    }
    
    /* 排名数字特殊样式 */
    td:first-child {
        font-weight: 700;
        color: #3498db;
        font-size: 1.1rem;
    }
    
    /* 数据高亮 */
    td:nth-child(3) { /* 距离列 */
        color: #e74c3c;
        font-weight: 600;
    }
    
    td:nth-child(5) { /* 均速列 */
        color: #27ae60;
        font-weight: 600;
    }
    
    /* 筛选信息显示 */
    #filterInfo {
        background: linear-gradient(135deg, #e3f2fd, #bbdefb);
        padding: 12px 20px;
        border-radius: 8px;
        margin: 15px 0;
        color: #1565c0;
        font-weight: 500;
        border-left: 4px solid #2196f3;
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
        .container {
            padding: 15px;
            border-radius: 10px;
        }
        
        h1 {
            font-size: 1.8rem;
        }
        
        #filterSection {
            padding: 15px;
        }
        
        #filterSection input[type="date"] {
            width: 100%;
            margin-bottom: 10px;
        }
        
        #filterSection button {
            width: 100%;
            margin-bottom: 10px;
        }
        
        table {
            display: block;
            overflow-x: auto;
        }
        
        th, td {
            padding: 12px 8px;
            font-size: 0.9rem;
        }
        
        form {
            padding: 15px;
        }
    }
    
    /* 顶部装饰条 */
    .header-bar {
        height: 5px;
        background: linear-gradient(90deg, #3498db, #2ecc71, #e74c3c, #f39c12);
        border-radius: 5px 5px 0 0;
        margin-bottom: 20px;
    }
    
    /* 加载动画 */
    .loading {
        text-align: center;
        padding: 20px;
        color: #7f8c8d;
        font-style: italic;
    }
    
    /* 空状态提示 */
    .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #95a5a6;
        font-size: 1.1rem;
    }
    #dataForm {
        /* 上面行内样式已定义网格，这里补充细节 */
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #e0e0e0;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
        margin-bottom: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        margin-bottom: 8px;
        color: #2c3e50;
        font-weight: 600;
        font-size: 0.9rem;
    }

    #dataForm input[type="text"],
    #dataForm input[type="number"],
    #dataForm input[type="date"] {
        width: 100%; /* 在网格单元格内自适应 */
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background-color: white;
    }

/* 移动端下恢复为垂直布局 */
    @media (max-width: 768px) {
        #dataForm {
            grid-template-columns: 1fr !important; /* 强制单列 */
            gap: 15px;
        }
        .form-group {
            margin-bottom: 0;
        }
    }

</style>
</head>
<body>
    <div class="container">
    <h1>袁庚书院骑行社官方网站version0.0.3</h1>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
    <h2 style="margin: 0; border: none; padding: 0; color: #2c3e50;">填写新记录</h2>
    <button type="button" id="toggleFormBtn" style="padding: 6px 12px; background: #95a5a6; color: white; border: none; border-radius: 4px; cursor: pointer;">
        收起 ▲
    </button>
    </div>
<div id="uploadFormContainer">
    <form method="POST" id="dataForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: end;">
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" name="name" required placeholder="请输入姓名">
        </div>
        <div class="form-group">
            <label for="distance">距离 (公里)</label>
            <input type="number" step="0.01" id="distance" name="distance" required placeholder="0.00">
        </div>
        <div class="form-group">
            <label for="time">时间 (分钟)</label>
            <input type="number" step="0.1" id="time" name="time" required placeholder="0.0">
        </div>
        <div class="form-group">
            <label for="date">骑行日期</label>
            <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group" style="grid-column: span 1;">
            <button type="submit" style="width: 100%;">提交数据</button>
        </div>
    </form>
</div>

<h2>数据筛选</h2>
<div id="filterSection">
    开始日期: <input type="date" id="startDate">
    结束日期: <input type="date" id="endDate">
    <button onclick="applyFilter()">筛选</button>
    <button onclick="clearFilter()">清除筛选</button>
</div>
    <h2>实时排行榜</h2>
    <select id="sortOption">
    <option value="distance">按距离排序</option>
    <option value="speed">按均速排序</option>
    <option value="date">按日期排序</option>
</select>
    <table>
        <thead>
        <tr>
            <th>排名</th>
            <th>姓名</th>
            <th>距离 (km)</th>
            <th>时间 (min)</th>
            <th>均速 (km/h)</th>
            <th>日期</th>
        </tr>
        </thead>
        <tbody id="ranking">
            <!-- 数据由 JavaScript 填充 -->
        </tbody>
    </table>
</div>
    <script>
        // 每5秒刷新排名
        function fetchRanking(sortBy = 'distance') {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            let url = `/get_ranking?sort_by=${sortBy}`;
            if (startDate) url += `&start_date=${startDate}`;
            if (endDate) url += `&end_date=${endDate}`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('ranking');
                    tbody.innerHTML = '';
                    data.forEach((row, index) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${index + 1}</td>
                            <td>${row.name}</td>
                            <td>${row.distance.toFixed(2)}</td>
                            <td>${row.time.toFixed(1)}</td>
                            <td>${row.speed ? row.speed.toFixed(4) : '-'}</td>  <!-- 显示均速 -->
                             <td>${row.date}</td>  <!-- 显示日期 -->
                        `;
                        tbody.appendChild(tr);
                    });
                    updateFilterInfo(startDate, endDate, data.length);
                });
        }
        function applyFilter() {
            fetchRanking(document.getElementById('sortOption').value);
        }
        function clearFilter() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            fetchRanking(document.getElementById('sortOption').value);
        }
        function updateFilterInfo(startDate, endDate, count) {
            let info = `共 ${count} 条记录`;
            if (startDate || endDate) {
            info += '（筛选条件：';
            if (startDate) info += `从 ${startDate} `;
            if (endDate) info += `到 ${endDate}`;
            info += ')';
            }
    
    // 创建或更新信息显示区域
            let infoDiv = document.getElementById('filterInfo');
            if (!infoDiv) {
            infoDiv = document.createElement('div');
            infoDiv.id = 'filterInfo';
            infoDiv.style.margin = '10px 0';
            infoDiv.style.padding = '5px';
            infoDiv.style.backgroundColor = '#f0f0f0';
            document.getElementById('filterSection').after(infoDiv);
        }
            infoDiv.textContent = info;
        }
        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = today;
             const dateInput = document.getElementById('date');
            if (dateInput && !dateInput.value) {
                dateInput.value = today;
            }
    
            // 初始加载数据
            fetchRanking();
    
            // 监听排序选项变化
            document.getElementById('sortOption').addEventListener('change', (e) => {
              fetchRanking(e.target.value);
            });
            const toggleFormBtn = document.getElementById('toggleFormBtn');
            const formContainer = document.getElementById('uploadFormContainer');
            if (toggleFormBtn && formContainer) {
                toggleFormBtn.addEventListener('click', function() {
                    if (formContainer.style.display === 'none') {
                        // 展开表单
                        formContainer.style.display = 'block';
                        toggleFormBtn.textContent = '收起 ▲';
                        toggleFormBtn.style.background = '#95a5a6';
                    } else {
                        // 收起表单
                        formContainer.style.display = 'none';
                        toggleFormBtn.textContent = '展开 ▼';
                        toggleFormBtn.style.background = '#2ecc71';
                    }
                });
            }
            // 定时刷新（可选）
            setInterval(() => {
            fetchRanking(document.getElementById('sortOption').value);
            }, 5000);
            
        };
        
        document.getElementById('sortOption').addEventListener('change', (e) => {
        fetchRanking(e.target.value);
    });
        // 初始加载
        fetchRanking();
        // 定时刷新
        setInterval(fetchRanking, 5000);
    </script>
</body>
</html>
