<!DOCTYPE html>
<html>
<head>
    <title>骑行社排行榜</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border: 1px solid #ccc; text-align: center; }
        input, button { padding: 8px; margin: 5px 0; }
        #filterSection {
            margin: 20px 0;
            padding: 15px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }

        #filterSection input, #filterSection button {
            margin-right: 10px;
            padding: 6px 12px;
        }

        #filterInfo {
            font-style: italic;
            color: #666;
            margin: 10px 0;
        }   
    </style>
</head>
<body>
    <h1>骑行数据上传</h1>
    <form method="POST">
        姓名: <input type="text" name="name" required><br>
        距离 (公里): <input type="number" step="0.01" name="distance" required><br>
        时间 (分钟): <input type="number" step="0.1" name="time" required><br>
        骑行日期: <input type="date" name="date" id="rideDate" required><br>
        <button type="submit">提交数据</button>
    </form>
<h2>数据筛选</h2>
<div id="filterSection">
    开始日期: <input type="date" id="startDate">
    结束日期: <input type="date" id="endDate">
    <button onclick="applyFilter()">筛选</button>
    <button onclick="clearFilter()">清除筛选</button>
</div>
    <h2>实时排行榜</h2>
    <select id="sortOption">
    <option value="distance">按距离排序</option>
    <option value="speed">按均速排序</option>
    <option value="date">按日期排序</option>
</select>
    <table>
        <tr>
            <th>排名</th>
            <th>姓名</th>
            <th>距离 (km)</th>
            <th>时间 (min)</th>
            <th>均速 (km/h)</th>
            <th>日期</th>
        </tr>
        <tbody id="ranking">
            <!-- 数据由 JavaScript 填充 -->
        </tbody>
    </table>

    <script>
        // 每5秒刷新排名
        function fetchRanking(sortBy = 'distance') {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            let url = `/get_ranking?sort_by=${sortBy}`;
            if (startDate) url += `&start_date=${startDate}`;
            if (endDate) url += `&end_date=${endDate}`;
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('ranking');
                    tbody.innerHTML = '';
                    data.forEach((row, index) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${index + 1}</td>
                            <td>${row.name}</td>
                            <td>${row.distance.toFixed(2)}</td>
                            <td>${row.time.toFixed(1)}</td>
                            <td>${row.speed ? row.speed.toFixed(4) : '-'}</td>  <!-- 显示均速 -->
                             <td>${row.date}</td>  <!-- 显示日期 -->
                        `;
                        tbody.appendChild(tr);
                    });
                    updateFilterInfo(startDate, endDate, data.length);
                });
        }
        function applyFilter() {
            fetchRanking(document.getElementById('sortOption').value);
        }
        function clearFilter() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            fetchRanking(document.getElementById('sortOption').value);
        }
        function updateFilterInfo(startDate, endDate, count) {
            let info = `共 ${count} 条记录`;
            if (startDate || endDate) {
            info += '（筛选条件：';
            if (startDate) info += `从 ${startDate} `;
            if (endDate) info += `到 ${endDate}`;
            info += ')';
            }
    
    // 创建或更新信息显示区域
            let infoDiv = document.getElementById('filterInfo');
            if (!infoDiv) {
            infoDiv = document.createElement('div');
            infoDiv.id = 'filterInfo';
            infoDiv.style.margin = '10px 0';
            infoDiv.style.padding = '5px';
            infoDiv.style.backgroundColor = '#f0f0f0';
            document.getElementById('filterSection').after(infoDiv);
        }
            infoDiv.textContent = info;
        }
        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = today;
            document.getElementById('rideDate').value = today;
    
            // 初始加载数据
            fetchRanking();
    
            // 监听排序选项变化
            document.getElementById('sortOption').addEventListener('change', (e) => {
              fetchRanking(e.target.value);
            });
    
            // 定时刷新（可选）
            setInterval(() => {
            fetchRanking(document.getElementById('sortOption').value);
            }, 5000);
        };
        document.getElementById('sortOption').addEventListener('change', (e) => {
        fetchRanking(e.target.value);
    });
        // 初始加载
        fetchRanking();
        // 定时刷新
        setInterval(fetchRanking, 5000);
    </script>
</body>
</html>
